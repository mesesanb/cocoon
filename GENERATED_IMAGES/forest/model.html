<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solitary | Secluded Travel 2026</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --accent: #f3f3f3;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
            overflow: hidden; /* 2026 Minimalism: No scroll on landing */
        }

        /* Video Background Container */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7) contrast(1.1); /* Subtle 2026 cinematic grade */
        }

        /* Content Overlay */
        .overlay {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);
        }

        header {
            position: absolute;
            top: 40px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
        }

        /* The Avant-Garde Booking Card */
        .booking-card {
            background: var(--glass);
            backdrop-filter: blur(15px); /* Core 2026 visual trend */
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 2px; /* Sharp corners for "Avant-Garde" feel */
            width: 80%;
            max-width: 900px;
            display: grid;
            grid-template-columns: repeat(3, 1fr) auto;
            gap: 20px;
            animation: fadeIn 1.5s ease-out;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            margin-bottom: 8px;
            opacity: 0.7;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: white;
            padding: 10px 0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-bottom-color: white;
        }

        .btn-search {
            background: white;
            color: black;
            border: none;
            padding: 0 40px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .btn-search:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        .hero-text {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 200;
            margin: 0;
            letter-spacing: -0.1rem;
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="bg-video" autoplay muted playsinline>
            <source src="01_vid.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        (function () {
            var video = document.getElementById('bg-video');
            if (!video) return;

            var rewinding = false;
            var speed = 0.7; // 30% slower (70% of normal speed)

            video.playbackRate = speed;

            function rewind() {
                rewinding = true;
                video.pause();
                var rewindStart = performance.now();
                var startTime = video.currentTime;

                function step(now) {
                    if (!video.duration || !isFinite(video.duration)) return;
                    var elapsed = (now - rewindStart) / 1000; // seconds
                    video.currentTime = Math.max(0, startTime - elapsed * speed);
                    if (video.currentTime <= 0) {
                        video.currentTime = 0;
                        rewinding = false;
                        video.play();
                        return;
                    }
                    requestAnimationFrame(step);
                }
                requestAnimationFrame(step);
            }

            video.addEventListener('ended', rewind);
        })();
    </script>

    <div class="overlay">
        <header>
            <div class="logo">Solitary</div>
            <nav>Log In / Discover</nav>
        </header>

        <div class="hero-text">
            <h1>Escape to Silence</h1>
            <p>Architectural sanctuaries in the world's quietest corners.</p>
        </div>

        <div class="booking-card">
            <div class="input-group">
                <label>Location</label>
                <input type="text" placeholder="Arctic Circle">
            </div>
            <div class="input-group">
                <label>Check In</label>
                <input type="text" placeholder="Feb 24, 2026">
            </div>
            <div class="input-group">
                <label>Duration</label>
                <input type="text" placeholder="1 Week of Peace">
            </div>
            <button class="btn-search">Find Solitude</button>
        </div>
    </div>

</body>
</html>
